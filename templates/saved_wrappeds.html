{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Data</title>
    <style>
        /* Ensure the body takes full height of the viewport */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        .background-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Full viewport height */
            background-image: url('{% static "application/lightInf.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center; /* Centers the content inside */
        }

        body.dark-mode .background-container {
            background-image: url('{% static "application/darkInf.jpg" %}');
        }

        .content {
            text-align: center;
            color: white;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background for better text visibility */
            padding: 20px;
            border-radius: 10px;
        }

        /* Light mode styling for all buttons */
        body:not(.dark-mode) .content button,
        body:not(.dark-mode) .content a {
            background-color: #3498db; /* Light blue background */
            color: white;
        }

        body:not(.dark-mode) .content button:hover,
        body:not(.dark-mode) .content a:hover {
            background-color: #2980b9; /* Darker blue on hover */
        }

        /* Dark mode styling for all buttons */
        body.dark-mode .content button,
        body.dark-mode .content a {
            background-color: #333333; /* Dark grey background */
            color: white;
        }

        body.dark-mode .content button:hover,
        body.dark-mode .content a:hover {
            background-color: #444444; /* Darker grey on hover */
        }

        /* Link button styles (e.g., "a" tags) */
        .content a {
            display: inline-block;
            margin: 10px 0;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        /* Button specific styles for Contact the Developers */
        .contact-button {
            margin-top: 15px;
        }

        /* Style for the Home button */
        .dark-mode-button {
            background-color: #3498db;
            color: white;
            font-size: 16px; /* Increased font size */
            padding: 16px 30px; /* Increased padding for a larger button */
            border: none;
            border-radius: 8px; /* Slightly rounded edges */
            cursor: pointer;
            transition: background-color 0.3s ease;
            position: absolute;
            top: 1%;
            z-index: 10;
        }

        #darkModeToggle {
            left: 1%;
        }

        #home {
            right: 1%;
        }

        /* Hover state for the dark mode button */
        .dark-mode-button:hover {
            background-color: #2980b9; /* Darker blue background on hover */
        }

        /* Dark mode styling for the button */
        body.dark-mode .dark-mode-button {
            background-color: #333333; /* Dark background in dark mode */
            color: white; /* White text in dark mode */
        }

        /* Dark mode button hover state */
        body.dark-mode .dark-mode-button:hover {
            background-color: #444444; /* Darker background on hover in dark mode */
        }
        .delete-button {
            background-color: #dc3545; /* Red */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
    </style>
<body>
<div class="background-container" id="bg">
    <!-- Dark Mode Button -->
    <button class="dark-mode-button" id="darkModeToggle">Toggle Dark Mode</button>
    <!-- Home Button with similar styling to Toggle Dark Mode -->
    <button class="dark-mode-button" id="home" onclick="location.href='{% url 'loggedIn' %}'">Home</button>

    <div class="content">
        <h1>Choose a past Wrapped to view</h1>
        {% if wrapped_list %}
            <div class="wrapped-container">
                {% for wrapped in wrapped_list %}
                    <a href="{% url 'view_saved_wrapped' wrapped.id %}">
                        <p>View Wrapped from {{ wrapped.timestamp|date:"F d, Y" }}</p>
                    </a>
                {% endfor %}
            </div>
        {% else %}
            <p>No saved wrapped items found.</p>
            <p>Debug: wrapped_list is empty.</p>
        {% endif %}
            <!-- New Delete All Button -->
        <form method="POST" action="{% url 'delete_all_wrappeds' %}" style="display: inline;"
              onsubmit="return confirmDeletion();">
            {% csrf_token %}
            <button type="submit" class="delete-button" style="background-color: darkred">Delete All Wraps</button>
        </form>
    </div>
</div>
<script>
    /**
     * Prompts user to confirm that they want to delete their data
     * @returns {boolean}
     */
    function confirmDeletion() {
        return confirm("Are you sure you want to delete all account data? This action cannot be undone. Deleting wraps will send you to the landing page.");
    }
    /**
     * Not a function, enables dark mode button to actually toggle dark mode.
     */
    document.getElementById('darkModeToggle').addEventListener('click', function () {
        document.body.classList.toggle('dark-mode');
        // Optionally, store the mode preference in localStorage
        if (document.body.classList.contains('dark-mode')) {
            localStorage.setItem('darkMode', 'enabled');
        } else {
            localStorage.removeItem('darkMode');
        }
    });

    // Check for saved dark mode preference on page load
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
    }

</script>
</body>
<!---

--->
</head>
</html>
