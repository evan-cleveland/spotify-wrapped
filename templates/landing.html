{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Wrapped</title>
    <style>
        /* Ensure the body takes full height of the viewport */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* The container for the background image */
        .background-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Takes full viewport height */
            background-image: url('{% static "application/background.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center; /* Centers the content inside */
        }

        /* Content area to keep your text centered */
        .content {
            text-align: center;
            color: white;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background for better text visibility */
            padding: 20px;
            border-radius: 10px;
        }

        /* Optional: Styling for the login link */
        a {
            text-decoration: none;
            color: white;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        a:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="content">
            <h1>Welcome to Spotify Wrapper</h1>
            <a href="{% url 'spotify_login' %}">Login with Spotify</a>
        </div>
    </div>
</body>
</html>
